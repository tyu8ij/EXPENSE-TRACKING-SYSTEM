name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean compile
    
    - name: Run JUnit Tests
      run: mvn test
    
    - name: Generate Code Coverage Report
      run: mvn jacoco:report
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Package JAR
      run: mvn package -DskipTests
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: jar-artifacts
        path: target/*.jar
    
    - name: Display Build Summary
      run: echo "✅ Build and Test completed successfully!"

  # Job 2: Docker Build and Push
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download JAR artifacts
      uses: actions/download-artifact@v3
      with:
        name: jar-artifacts
        path: target/
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/expense-tracking-system:latest
          ${{ secrets.DOCKER_USERNAME }}/expense-tracking-system:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/expense-tracking-system:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/expense-tracking-system:buildcache,mode=max
    
    - name: Display Docker Build Summary
      run: echo "✅ Docker image built and pushed successfully!"

  # Job 3: Deploy to Kubernetes
  deploy-to-kubernetes:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Kubernetes context
      uses: azure/k8s-set-context@v3
      with:
        method: service-account
        k8s-url: ${{ secrets.K8S_URL }}
        k8s-secret: ${{ secrets.K8S_SECRET }}
    
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl set image deployment/expense-tracker-deployment \
          expense-tracker=${{ secrets.DOCKER_USERNAME }}/expense-tracking-system:${{ github.sha }} \
          -n default
        kubectl rollout status deployment/expense-tracker-deployment -n default
    
    - name: Verify Deployment
      run: |
        echo "Checking deployment status..."
        kubectl get deployments -n default
        kubectl get pods -n default
        kubectl get services -n default
    
    - name: Display Deployment Summary
      run: echo "✅ Deployment to Kubernetes completed successfully!"

  # Job 4: Validation and Notifications
  validate:
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: always()
    
    steps:
    - name: Check Build Status
      run: |
        if [ "${{ needs.build-and-test.result }}" == "success" ] && [ "${{ needs.docker-build.result }}" == "success" ]; then
          echo "✅ All checks passed! Pipeline successful."
          exit 0
        else
          echo "❌ Pipeline failed. Check logs for details."
          exit 1
        fi
    
    - name: Send Notification (Success)
      if: success()
      run: echo "📢 CI/CD Pipeline completed successfully!"
    
    - name: Send Notification (Failure)
      if: failure()
      run: echo "⚠️ CI/CD Pipeline failed. Review the logs."
